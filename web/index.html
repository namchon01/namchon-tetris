<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Namchon Tetris</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <main class="game">
        <section class="board-section">
          <canvas id="board" aria-label="테트리스 게임 보드"></canvas>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div class="title-block">
              <h1>TETRIS</h1>
              <div class="stats">
                <div class="stat">
                  <span class="label">SCORE</span>
                  <span id="score" class="value">0</span>
                </div>
                <div class="stat">
                  <span class="label">LEVEL</span>
                  <span id="level" class="value">1 / 5</span>
                </div>
                <div class="stat">
                  <span class="label">LINES</span>
                  <span id="lines" class="value">0</span>
                </div>
              </div>
              <div class="level-progress">
                <div class="level-progress-meta">
                  <span class="label">LEVEL SCORE</span>
                  <span id="level-score" class="value">0 / 2000</span>
                </div>
                <div class="level-progress-bar" aria-hidden="true">
                  <div id="level-progress-fill" class="level-progress-fill"></div>
                </div>
              </div>
            </div>
            <div class="next-block">
              <span class="label">NEXT</span>
              <canvas id="next-piece" width="64" height="64" aria-label="다음 블록"></canvas>
            </div>
          </div>

          <div class="controls">
            <button class="control-btn" data-action="left" aria-label="왼쪽">◀</button>
            <button class="control-btn" data-action="right" aria-label="오른쪽">▶</button>
            <button class="control-btn" data-action="rotate" aria-label="회전">↻</button>
            <button class="control-btn" data-action="down" aria-label="아래">↓</button>
            <button class="control-btn wide" data-action="drop" aria-label="하드 드롭">DROP</button>
          </div>

          <div class="actions">
            <button id="pause-btn" class="action-btn">PAUSE</button>
            <button id="restart-btn" class="action-btn">RESTART</button>
          </div>
        </section>
      </main>

      <div id="pause-overlay" class="overlay hidden">
        <p>PAUSED</p>
      </div>

      <div id="level-up-overlay" class="overlay toast hidden">
        <p id="level-up-text">LEVEL UP!</p>
      </div>

      <div id="game-over-overlay" class="overlay hidden">
        <div class="modal">
          <h2>GAME OVER</h2>
          <p>Score: <span id="final-score">0</span></p>
          <p class="hint" id="retry-hint">이전 레벨부터 다시 시작합니다</p>
          <button id="play-again-btn" class="action-btn primary">PLAY AGAIN</button>
        </div>
      </div>

      <div id="cleared-overlay" class="overlay hidden">
        <div class="modal">
          <h2>CLEAR!</h2>
          <p>5레벨을 모두 클리어했습니다</p>
          <p>Score: <span id="cleared-score">0</span></p>
          <button id="cleared-restart-btn" class="action-btn primary">RESTART</button>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
